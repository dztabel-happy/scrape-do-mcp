name: scrape-do-mcp
description: MCP Server for Scrape.do - Web Scraping & Google Search with anti-bot bypass
startCommand:
  type: stdio
  configSchema:
    type: object
    required: [SCRAPE_DO_TOKEN]
    properties:
      SCRAPE_DO_TOKEN:
        type: string
        description: Your Scrape.do API token. Get it free at https://app.scrape.do
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "scrape-do-mcp"],
      env: { SCRAPE_DO_TOKEN: config.SCRAPE_DO_TOKEN }
    })
